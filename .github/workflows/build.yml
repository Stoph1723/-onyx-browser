name: Build Onyx Browser

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: privacy-browser
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Disable built-in npm cache - we use actions/cache below
          
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: privacy-browser/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('privacy-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
          
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
        
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Onyx Browser
        run: npm run tauri:build
        
      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onyx-browser-windows
          path: privacy-browser/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30