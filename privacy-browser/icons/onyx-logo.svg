<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="onyxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b89c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#onyxGradient)"/>
  
  <!-- Subtle pattern overlay -->
  <g opacity="0.03">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="512" height="512" rx="80" fill="url(#grid)"/>
  </g>
  
  <!-- Main Shield Shape -->
  <path d="M256 40C136.7 40 40 136.7 40 256c0 80.5 52.3 148.3 124.8 172.6C172.7 414.7 184 396 200 380c16-16 40-16 56 0l8 8c16 16 40 16 56 0 16-16 27.3-34.7 34.2-55.4 72.5-24.3 124.8-92.1 124.8-172.6C472 136.7 375.3 40 256 40zm0 40c55.2 0 104 44.8 104 100 0 55.2-33.6 97.6-80 121.6-4.8 2.4-10.4 2.4-15.2 0-46.4-24-80-66.4-80-121.6C152 84.8 200.8 40 256 40zm0 40c55.2 0 104 44.8 104 100 0 55.2-33.6 97.6-80 121.6-4.8 2.4-10.4 2.4-15.2 0-46.4-24-80-66.4-80-121.6C152 84.8 200.8 40 256 40z" fill="url(#shieldGradient)" filter="url(#glow)"/>
  
  <!-- Inner Shield Accent -->
  <path d="M256 120c-22.1 0-40 17.9-40 40s17.9 40 40 40 40-17.9 40-40-17.9-40-40-40zm0 64c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24z" fill="url(#accentGradient)" opacity="0.9"/>
  
  <!-- Circuit Pattern - representing privacy/tech -->
  <g stroke="url(#accentGradient)" stroke-width="2" fill="none" filter="url(#innerGlow)">
    <!-- Central circuit lines -->
    <path d="M256 100V160M256 352V412" stroke-width="3"/>
    <path d="M180 256H120M332 256H392" stroke-width="3"/>
    
    <!-- Corner brackets -->
    <path d="M140 140h30M140 140v30" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M372 140h-30M372 140v30" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M140 372h30M140 372v-30" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M372 372h-30M372 372v-30" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Center crosshair -->
    <circle cx="256" cy="256" r="30" stroke-width="1.5" opacity="0.5"/>
    <path d="M256 226v-12M256 286v12M226 256h-12M286 256h12" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Privacy Lock Symbol -->
  <g transform="translate(256, 300)" filter="url(#innerGlow)">
    <path d="M-24 0H24M-12 -12v12M12 -12v12" stroke="url(#accentGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M-18 0a18 18 0 0 1 36 0v18a18 18 0 0 1-36 0z" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="6" r="4" fill="url(#accentGradient)" opacity="0.9"/>
  </g>
  
  <!-- Subtle text "ONYX" -->
  <text x="256" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="8" fill="url(#accentGradient)" opacity="0.4" filter="url(#glow)">ONYX</text>
  
  <!-- Version badge -->
  <text x="256" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" letter-spacing="2" fill="#00d4aa" opacity="0.3">v1.0.0 PRIVACY FIRST</text>
</svg>